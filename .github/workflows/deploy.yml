name: Deploy counting-app to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "counting-app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish only the app subdirectory as the site root.
          path: counting-app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
