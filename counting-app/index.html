<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Count Out Loud! 🔢</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" id="app">
    <!-- Top status / mic indicator -->
    <header class="status-bar">
      <div class="status-line">
        <span class="mic-dot" id="micDot" aria-hidden="true"></span>
        <span class="status-text" id="statusText">Tap “Start” and say the number!</span>
      </div>
      <span class="heard-text" id="heardText" aria-live="polite"></span>
    </header>

    <!-- Big number in the middle -->
    <section class="number-stage" id="numberStage">
      <div class="number" id="numberDisplay">1</div>
    </section>

    <!-- Start overlay (needed for mic permission gesture) -->
    <div class="overlay start-overlay" id="startOverlay">
      <div class="overlay-card">
        <h1>🔢 Count Out Loud!</h1>
        <p>Say the number you see. Get it right to move on!</p>
        <button class="big-button start-button" id="startButton">▶︎ Start</button>
        <p class="hint">Can’t hear you? Just <strong>tap the number</strong> to move on.</p>
        <p class="hint" id="supportHint"></p>
      </div>
    </div>

    <!-- Celebration overlay -->
    <div class="overlay celebrate-overlay" id="celebrateOverlay" hidden>
      <div class="overlay-card">
        <div class="celebrate-emoji">🎉🥳🎊</div>
        <h1>You did it!</h1>
        <p>Let’s go again!</p>
      </div>
    </div>

    <!-- Bottom direction controls -->
    <footer class="controls">
      <button class="arrow-button" id="downButton" aria-label="Count down" aria-pressed="false">
        <span class="arrow">▼</span>
        <span class="arrow-label">Down</span>
      </button>
      <button class="arrow-button is-active" id="upButton" aria-label="Count up" aria-pressed="true">
        <span class="arrow">▲</span>
        <span class="arrow-label">Up</span>
      </button>
    </footer>
  </main>

  <!-- Confetti container -->
  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <script src="app.js"></script>
</body>
</html>
